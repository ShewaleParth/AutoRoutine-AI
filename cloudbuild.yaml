steps:
  # 1. Build Frontend
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-f', 'frontend/Dockerfile',
      '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/autoroutine-repo/frontend:latest',
      '--build-arg', 'VITE_API_URL=$_VITE_API_URL',
      './frontend'
    ]

  # 2. Push Frontend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/autoroutine-repo/frontend:latest']

  # 3. Deploy Frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'autoroutine-frontend'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/autoroutine-repo/frontend:latest'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '80'

substitutions:
  _VITE_API_URL: 'change-me'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/autoroutine-repo/frontend:latest'
